<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revora</title>
    <link rel="icon" href="/revora-logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="popup-brand-bar">
      <div class="popup-brand-bar__content">
        <span class="popup-brand-mark" aria-hidden="true">
          <img
            src="/revora-logo.svg"
            alt=""
            width="32"
            height="32"
            decoding="async"
          >
        </span>
        <div class="popup-brand-copy">
          <h1 class="popup-brand-title">Revora</h1>
          <p class="popup-brand-subtitle">
            Import Temu reviews to your Shopify store
          </p>
        </div>
      </div>
    </header>

    <main class="popup-stack">
      <div class="revora-well">
        <div class="revora-status-row">
          <span id="status-icon" aria-hidden="true"></span>
          <p id="status" class="revora-text-subdued">Not connected</p>
        </div>
      </div>

      <div
        class="revora-banner revora-banner--info popup-hint"
        id="status-hint"
      >
        <p class="revora-banner__heading">Connect from Shopify admin</p>
        <p class="revora-banner__body">
          Open Revora in your Shopify admin, then click <strong>Connect</strong>
          in the app. The extension will link automatically.
        </p>
      </div>

      <div class="popup-actions" id="sync-actions">
        <button
          id="sync-btn"
          type="button"
          class="revora-btn revora-btn--secondary"
        >
          <span id="sync-btn-label">Sync from admin</span>
        </button>
      </div>

      <div class="popup-actions" id="connected-actions" hidden>
        <button
          id="disconnect-btn"
          type="button"
          class="revora-btn revora-btn--secondary revora-btn--destructive"
        >
          <span id="disconnect-btn-label">Disconnect</span>
        </button>
      </div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
