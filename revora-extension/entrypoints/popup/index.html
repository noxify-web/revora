<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revora</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <header class="header">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">R</span>
          <div class="brand-copy">
            <span class="brand-name">Revora</span>
            <span class="brand-tagline">Temu review importer</span>
          </div>
        </div>
        <span class="status-badge" id="status-badge" hidden>
          <span class="status-dot" aria-hidden="true"></span>
          <span id="status-badge-label">Connected</span>
        </span>
      </header>

      <section class="view" id="connect-view">
        <p class="lead" id="status">Not connected</p>
        <p class="hint" id="status-hint">
          Open Revora in Shopify admin, then connect your store.
        </p>
        <button id="connect-btn" type="button" class="primary">
          Connect store
        </button>
        <button id="sign-in-btn" type="button" class="ghost">
          Sign in manually
        </button>
      </section>

      <section class="view view-connected" id="connected-view" hidden>
        <div class="connected-card">
          <div class="connected-icon" aria-hidden="true">✓</div>
          <div class="connected-copy">
            <p class="connected-title" id="store-name">Store connected</p>
            <p class="connected-meta">Ready to import from Temu</p>
          </div>
        </div>
        <button id="open-admin-btn" type="button" class="primary">
          Open Revora in Shopify
        </button>
      </section>

    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
