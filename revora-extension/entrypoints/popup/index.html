<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revora</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <header class="hero">
        <div>
          <p class="eyebrow">Revora</p>
          <h1>Connect your store</h1>
        </div>
        <span class="badge" id="plan-badge">Free</span>
      </header>

      <section class="card">
        <p class="hint">
          Open Revora in Shopify admin and click <strong>Connect extension</strong>,
          or sign in below. Server:
          <span id="server-label" class="server-label">Not synced yet</span>
        </p>
        <div class="actions">
          <button id="sync-admin-btn" type="button" class="secondary">
            Sync from admin
          </button>
          <button id="sign-in-btn" type="button">Sign in with Revora</button>
        </div>
      </section>

      <section class="card">
        <label for="reviews-selector">Temu reviews override (optional)</label>
        <input
          id="reviews-selector"
          type="text"
          placeholder="Auto-detects See all reviews"
          spellcheck="false"
        />
        <button id="save-btn" type="button" class="secondary full">
          Save settings
        </button>
      </section>

      <p id="status" class="status">Not connected yet.</p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
