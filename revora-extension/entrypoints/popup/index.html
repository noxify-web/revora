<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revora</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <header class="brand-row">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">R</span>
          <span class="brand-name">Revora</span>
        </div>
        <span class="plan-pill" id="plan-badge">Free</span>
      </header>

      <section class="panel">
        <div class="status-row">
          <span class="status-dot" id="status-dot" aria-hidden="true"></span>
          <p id="status" class="status-text">Not connected</p>
        </div>

        <button id="connect-btn" type="button" class="primary">
          Connect store
        </button>
        <button id="sign-in-btn" type="button" class="ghost">
          Sign in manually
        </button>
      </section>

      <details class="advanced">
        <summary>Advanced</summary>
        <label for="reviews-selector">Temu reviews selector</label>
        <input
          id="reviews-selector"
          type="text"
          placeholder="Leave blank to auto-detect"
          spellcheck="false"
        />
        <button id="save-btn" type="button" class="secondary full">
          Save
        </button>
      </details>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
